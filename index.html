<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/slider.css">

</head>

<body>
    <!-- Slider main container -->
    <section class="swiper-container" id="brands">

        <h5 class="swiper-container__header">Ремонт техники различных брендов</h5>
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
            <!-- Slides -->
            <div class="swiper-slide" id='lenovo-slide'>
                <div class='logocomp' id='lenovo'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide" id='samsung-slide'>
                <div class='logocomp' id='samsung'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide" id='apple-slide'>
                <div class='logocomp' id='apple'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide" id='viewsonic-slide'>
                <div class='logocomp' id='viewsonic'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide" id='bosch-slide'>
                <div class='logocomp' id='bosch'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide" id='hp-slide'>
                <div class='logocomp' id='hp'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide" id='acer-slide'>
                <div class='logocomp' id='acer'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide" id='sony-slide'>
                <div class='logocomp' id='sony'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide">
                <div class='logocomp' id='lenovo'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide">
                <div class='logocomp' id='samsung'></div>
                <button id='go' title='открыть'></button>
            </div>
            <div class="swiper-slide">
                <div class='logocomp' id='apple'></div>
                <button id='go' title='открыть'></button>
            </div>

            <div class=swiper-rightgradient>
            </div>
        </div>
        <input type="checkbox" class="slide-expanded" id="slide-expanded">
        <label for="slide-expanded" class="slide-expanded__label">
                        <img id="showmoreImg" src="icons/icexpand.svg" width="10" height="16" alt="Показать все">
                     </label>





        <!-- If we need pagination -->
        <div class="swiper-pagination"></div>

        <!-- If we need navigation buttons -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <!-- If we need scrollbar -->
        <div class="swiper-scrollbar"></div>
    </section>
</body>

</html>
